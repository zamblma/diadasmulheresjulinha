<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
<link rel="stylesheet" href="styles.css">
    <title>Login</title>
</head>

<body>
    <main class="container">
        <form onsubmit="ValidarLogin(event)">
    <h1>Login</h1>
    <div class="input-box">
        <input id="usuario" placeholder="Usuário" type="email" required>
        <i class="bx bxs-user"></i>
    </div>
    <div class="input-box">
        <input id="senha" placeholder="Senha" type="password" required>
        <i class="bx bxs-lock-alt"></i>
    </div>

    <div class="remember-forgot">
        <label>
          <input type="checkbox"> 
          Lembrar minha senha 
        </label>
        <a href="pgesquecisenha.html">Esqueci minha senha</a>  
    </div>
<button type="submit" class="login">Login</button>
<div>
    <p>Não tem uma conta? <a href="pgcadastro.html">Cadastre-se</a></p>
</div>
        </form>
<script src="javascript/script.js"></script>

    </main>    

</body>
</html>
